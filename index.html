<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#003478">
<meta name="color-scheme" content="light only">
<title>한식 Menu Master — Korean</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── Korean flag palette ──
   Taegukgi: white background, #003478 blue (trigrams), #CD2E3A red (trigrams)
   We use both colours as the dual accent — blue as primary, red as secondary highlight */
:root{
  --blue:#003478;
  --blue2:#1a4f9e;
  --blue-soft:#EEF2FA;
  --blue-mid:#C0CFEE;
  --red:#CD2E3A;
  --red2:#a32330;
  --red-soft:#FAEEEE;
  --white:#FFFFFF;
  --ink:#1C1C1E;
  --ink2:#3A3A3C;
  --ink3:#6C6C70;
  --bg:#FFFFFF;
  --bg2:#F9F9F9;
  --bg3:#F2F2F2;
  --bdr:rgba(0,0,0,0.08);
  --bdr-blue:rgba(0,52,120,0.18);
  --shd:0 1px 6px rgba(0,0,0,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--white);color:var(--ink);font-family:'Noto Sans KR',sans-serif}

/* ── HEADER — deep Taegukgi blue with white text ── */
header{background:var(--blue);flex-shrink:0}
.header-inner{max-width:900px;margin:0 auto;padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between}
.hl{display:flex;align-items:center;gap:10px}
.logo-circle{width:38px;height:38px;border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ht-title{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:600;color:var(--white);letter-spacing:.04em}
.ht-sub{font-size:10px;color:rgba(255,255,255,.6);letter-spacing:.12em;text-transform:uppercase;margin-top:1px}
.streak-badge{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:4px 11px;color:var(--white);font-size:12px}

/* ── NAV — blue underline on white ── */
nav{background:var(--white);border-bottom:2px solid var(--blue);display:flex;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
nav::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;padding:11px 18px;border:none;background:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--ink3);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .18s;white-space:nowrap}
.nav-btn.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.nav-btn:hover{color:var(--blue)}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100%}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none;max-width:900px;margin:0 auto;padding:1.2rem 1rem 4rem}
.page.active{display:block}

/* ── SHARED ── */
.sh{display:flex;align-items:center;gap:8px;margin-bottom:1.1rem;padding-bottom:.6rem;border-bottom:1px solid var(--bdr)}
.sh h2{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:600;color:var(--ink)}
.orn{color:var(--blue);font-size:13px;opacity:.6}
.card{background:var(--white);border:1px solid var(--bdr);border-top:3px solid var(--blue);border-radius:2px;padding:1.4rem;margin-bottom:1rem;box-shadow:var(--shd)}

/* ── QUIZ ── */
.quiz-char{font-family:'Noto Serif KR',serif;font-size:88px;color:var(--ink);text-align:center;line-height:1.1;margin:.3rem 0 .2rem;cursor:pointer;transition:transform .12s;display:inline-block;user-select:none}
.quiz-char:hover{transform:scale(1.05)}
.quiz-rom{font-size:15px;color:var(--blue);text-align:center;margin-bottom:.3rem;letter-spacing:.06em;font-weight:300}
.quiz-prompt{font-size:11px;color:var(--ink3);text-align:center;margin-bottom:1rem;letter-spacing:.05em;text-transform:uppercase}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.qopt{background:var(--white);border:1px solid var(--bdr);border-radius:2px;padding:13px 10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:12px;transition:all .18s;text-align:center;color:var(--ink);line-height:1.4}
.qopt:hover{border-color:var(--blue);background:var(--blue-soft);color:var(--blue)}
.qopt.ok{border-color:#2e7d32;background:#f1f8f1;color:#1b5e20}
.qopt.no{border-color:var(--red);background:var(--red-soft);color:var(--red2)}
.qfb{text-align:center;font-size:13px;min-height:20px;margin-top:.8rem}
.quiz-score-row{display:flex;justify-content:center;gap:28px;margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--bdr)}
.qscore-item{text-align:center}
.qscore-num{font-family:'Noto Serif KR',serif;font-size:28px;font-weight:600;line-height:1}
.qscore-num.c{color:#2e7d32}
.qscore-num.w{color:var(--red)}
.qscore-lbl{font-size:10px;color:var(--ink3);margin-top:3px;text-transform:uppercase;letter-spacing:.08em}
.quiz-spk{background:var(--blue);color:var(--white);border:none;border-radius:2px;padding:8px 20px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:.8rem;display:inline-flex;align-items:center;gap:6px;transition:background .15s}
.quiz-spk:hover{background:var(--blue2)}
.quiz-mode-toggle{display:flex;gap:6px;margin-bottom:1rem}
.qmode{flex:1;padding:8px;background:var(--bg2);border:1px solid var(--bdr);border-radius:2px;cursor:pointer;font-size:11px;color:var(--ink3);font-family:'Noto Sans KR',sans-serif;text-align:center;transition:all .18s}
.qmode.on{background:var(--blue);color:var(--white);border-color:var(--blue);font-weight:500}

/* ── MENU ── */
.menu-search{width:100%;padding:9px 14px;border:none;border-bottom:2px solid var(--blue);background:var(--bg2);font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--ink);outline:none;margin-bottom:1rem}
.menu-search:focus{background:var(--white);border-bottom-color:var(--blue2)}
.menu-search::placeholder{color:var(--ink3)}
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.ctab{background:var(--white);border:1px solid var(--bdr);border-radius:2px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:var(--ink2);transition:all .18s;font-weight:500}
.ctab.on,.ctab:hover{background:var(--blue);color:var(--white);border-color:var(--blue)}
.menu-count{font-size:11px;color:var(--ink3);margin-bottom:.7rem}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:7px}
.mi{background:var(--white);border:1px solid var(--bdr);border-radius:2px;padding:11px 13px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:11px;border-left:3px solid transparent}
.mi:hover{border-left-color:var(--blue);background:var(--blue-soft)}
.mchar{font-family:'Noto Serif KR',serif;font-size:20px;color:var(--ink);min-width:44px;text-align:center;line-height:1.3;flex-shrink:0}
.minfo{flex:1;min-width:0}
.mrom{font-size:11px;color:var(--blue);font-weight:500;margin-bottom:1px}
.men{font-size:13px;color:var(--ink);font-weight:500;margin-bottom:2px}
.mdesc{font-size:10px;color:var(--ink3);line-height:1.35}
.mtag{display:inline-block;font-size:9px;padding:2px 6px;border-radius:2px;margin-top:2px;font-weight:500;letter-spacing:.03em}
.tv{background:#eef7ee;color:#2e7d32;border:1px solid #b2dfb3}
.th{background:var(--red-soft);color:var(--red2);border:1px solid #f4bfc3}
.tp{background:var(--blue-soft);color:var(--blue);border:1px solid var(--blue-mid)}
.ts{background:#e8f4fb;color:#1a5276;border:1px solid #9ecde8}
.mspk{background:none;border:1px solid var(--bdr);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--blue);flex-shrink:0;transition:all .18s}
.mspk:hover{background:var(--blue);color:var(--white)}

/* ── PHRASES ── */
.ptabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.ptab{background:var(--white);border:1px solid var(--bdr);border-radius:2px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:var(--ink2);transition:all .18s;font-weight:500}
.ptab.on,.ptab:hover{background:var(--blue);color:var(--white);border-color:var(--blue)}
.plist{display:flex;flex-direction:column;gap:5px}
.pcard{background:var(--white);border:1px solid var(--bdr);border-radius:2px;padding:12px 14px;display:flex;align-items:center;gap:12px;transition:all .18s;border-left:3px solid transparent}
.pcard:hover{border-left-color:var(--blue);background:var(--blue-soft)}
.pcn{font-family:'Noto Serif KR',serif;font-size:16px;min-width:150px;color:var(--ink);line-height:1.45;cursor:pointer}
.pdet{flex:1;min-width:0}
.prom{font-size:11px;color:var(--blue);margin-bottom:2px;font-weight:500}
.pen{font-size:12px;color:var(--ink2)}
.pspk{background:none;border:1px solid var(--bdr);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--blue);flex-shrink:0;transition:all .18s}
.pspk:hover{background:var(--blue);color:var(--white)}

/* ── PROGRESS ── */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:1.4rem}
.scard{background:var(--white);border:1px solid var(--bdr);border-top:3px solid var(--blue);border-radius:2px;padding:14px;text-align:center}
.snum{font-family:'Noto Serif KR',serif;font-size:34px;font-weight:600;color:var(--blue);line-height:1}
.slbl{font-size:10px;color:var(--ink3);margin-top:5px;text-transform:uppercase;letter-spacing:.08em}
.prog-bar-wrap{margin-bottom:.9rem}
.prog-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--ink3);margin-bottom:4px}
.prog-bar-track{background:var(--bg3);height:5px;border-radius:2px;overflow:hidden}
.prog-bar-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .4s}
.reset-btn{background:none;border:1px solid var(--bdr);border-radius:2px;padding:9px 18px;cursor:pointer;color:var(--ink3);font-family:'Noto Sans KR',sans-serif;font-size:12px;margin-top:.5rem}
.reset-btn:hover{border-color:var(--red);color:var(--red)}

/* ── Red accent on interactive elements — mirrors Taegukgi duality ── */
.card{border-top-color:var(--blue)}
.quiz-char:active{color:var(--red)}

/* ── TOAST ── */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--white);padding:9px 18px;border-radius:2px;font-size:13px;transition:transform .25s;z-index:999;white-space:nowrap;pointer-events:none;border-left:3px solid var(--blue)}
.toast.on{transform:translateX(-50%) translateY(0)}

@media(max-width:500px){.quiz-char{font-size:68px}.mgrid{grid-template-columns:1fr}.qopts{grid-template-columns:1fr}.pcn{min-width:110px;font-size:14px}}
</style>
</head>
<body>
<div id="app">

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="hl">
      <div class="logo-circle">🍲</div>
      <div>
        <div class="ht-title">한식 Menu Master</div>
        <div class="ht-sub">Korean Restaurant Guide</div>
      </div>
    </div>
    <div class="streak-badge">🔥 <span id="sc">0</span> day streak</div>
  </div>
</header>

<!-- NAV -->
<nav>
  <button class="nav-btn active" onclick="tab('menu',this)">🍲 Menu</button>
  <button class="nav-btn" onclick="tab('phrases',this)">💬 Phrases</button>
  <button class="nav-btn" onclick="tab('quiz',this)">🧠 Quiz</button>
  <button class="nav-btn" onclick="tab('progress',this)">📊 Progress</button>
</nav>

<!-- CONTENT -->
<div class="content">

  <!-- MENU -->
  <div class="page active" id="page-menu">
    <input class="menu-search" id="menuSearch" type="text" placeholder="Search in Korean, romanisation or English…" oninput="filterMenu()">
    <div class="cat-tabs" id="catTabs"></div>
    <div class="menu-count" id="menuCount"></div>
    <div class="mgrid" id="menuGrid"></div>
  </div>

  <!-- PHRASES -->
  <div class="page" id="page-phrases">
    <div class="ptabs" id="phraseTabs"></div>
    <div class="plist" id="phraseList"></div>
  </div>

  <!-- QUIZ -->
  <div class="page" id="page-quiz">
    <div class="card">
      <div class="quiz-mode-toggle">
        <button class="qmode on" id="qm-meaning" onclick="setQuizMode('meaning',this)">Korean → English</button>
        <button class="qmode" id="qm-reading" onclick="setQuizMode('reading',this)">English → Korean</button>
        <button class="qmode" id="qm-listen" onclick="setQuizMode('listen',this)">🔊 Listen &amp; Choose</button>
      </div>
      <div style="text-align:center">
        <div class="quiz-char" id="qChar" onclick="spkQuiz()">밥</div>
        <div class="quiz-rom" id="qRom"></div>
        <div class="quiz-prompt" id="qPrompt">What does this mean?</div>
      </div>
      <div class="qopts" id="qOpts"></div>
      <div class="qfb" id="qFb"></div>
      <div style="text-align:center">
        <button class="quiz-spk" onclick="spkQuiz()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          Hear pronunciation
        </button>
      </div>
      <div class="quiz-score-row">
        <div class="qscore-item"><div class="qscore-num c" id="qCorrect">0</div><div class="qscore-lbl">Correct</div></div>
        <div class="qscore-item" style="display:flex;align-items:center;font-size:20px;color:var(--ink3)">/</div>
        <div class="qscore-item"><div class="qscore-num" style="color:var(--ink2)" id="qTotal">0</div><div class="qscore-lbl">Total</div></div>
      </div>
    </div>
    <p style="font-size:11px;color:var(--ink3);text-align:center">Tap the character or the button to hear the pronunciation</p>
  </div>

  <!-- PROGRESS -->
  <div class="page" id="page-progress">
    <div class="sh"><span class="orn">❖</span><h2>Your Progress</h2></div>
    <div class="sgrid">
      <div class="scard"><div class="snum" id="pDays">0</div><div class="slbl">Days Active</div></div>
      <div class="scard"><div class="snum" id="pStreak">0</div><div class="slbl">Day Streak</div></div>
      <div class="scard"><div class="snum" id="pAcc">—</div><div class="slbl">Quiz Accuracy</div></div>
      <div class="scard"><div class="snum" id="pSeen">0</div><div class="slbl">Words Heard</div></div>
    </div>
    <div class="prog-bar-wrap">
      <div class="prog-bar-label"><span>Menu words explored</span><span id="pMenuFrac">0/0</span></div>
      <div class="prog-bar-track"><div class="prog-bar-fill" id="pMenuBar" style="width:0%"></div></div>
    </div>
    <div class="prog-bar-wrap">
      <div class="prog-bar-label"><span>Phrases explored</span><span id="pPhrFrac">0/0</span></div>
      <div class="prog-bar-track"><div class="prog-bar-fill" id="pPhrBar" style="width:0%"></div></div>
    </div>
    <button class="reset-btn" onclick="confirmReset()">Reset Progress</button>
  </div>

</div>
</div>
<div class="toast" id="toast"></div>

<script>

let S = {streak:0,lastDate:'',seenDates:{},qCorrect:0,qTotal:0,days:0,seenMenu:[],seenPhrases:[]};
function loadS(){try{const r=localStorage.getItem(LS);if(r){const p=JSON.parse(r);S={...S,...p};}}catch(e){}}
function saveS(){localStorage.setItem(LS,JSON.stringify(S));}

(function(){
  const today=new Date().toISOString().slice(0,10);
  if(S.lastDate!==today){
    const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
    S.streak=(S.lastDate===yest)?S.streak+1:1;
    S.lastDate=today;S.days++;S.seenDates[today]=true;saveS();
  }
})();

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function tab(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  document.querySelector('.content').scrollTop=0;
  if(name==='menu')renderMenu();
  if(name==='phrases')renderPhrases();
  if(name==='quiz')initQuiz();
  if(name==='progress')renderProgress();
}

// ═══════════════════════════════════════
// SPEECH
// ═══════════════════════════════════════
function spk(text){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR';u.rate=0.82;
  const voices=speechSynthesis.getVoices();
  const v=voices.find(x=>x.lang==='ko-KR')||voices.find(x=>x.lang.startsWith('ko'));
  if(v)u.voice=v;
  speechSynthesis.speak(u);
  if(!S.seenMenu.includes(text)){S.seenMenu.push(text);saveS();}
}
if(window.speechSynthesis)speechSynthesis.addEventListener('voiceschanged',()=>{});

// ═══════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════
let quizMode='meaning';
let quizCurrent=null;
let quizAnswered=false;

function setQuizMode(mode,btn){
  quizMode=mode;
  document.querySelectorAll('.qmode').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  nextQuiz();
}

function allItems(){return MENU.flatMap(c=>c.items);}

function initQuiz(){if(!quizCurrent)nextQuiz();}

function nextQuiz(){
  quizAnswered=false;
  document.getElementById('qFb').textContent='';
  document.querySelectorAll('.qopt').forEach(o=>{o.classList.remove('ok','no');});
  const pool=allItems();
  const q=pool[Math.floor(Math.random()*pool.length)];
  quizCurrent=q;
  const charEl=document.getElementById('qChar');
  const romEl=document.getElementById('qRom');
  const promptEl=document.getElementById('qPrompt');
  charEl.style.fontSize='';
  if(quizMode==='meaning'){
    charEl.textContent=q.ch;romEl.textContent=q.rom;promptEl.textContent='What does this mean?';
  } else if(quizMode==='reading'){
    charEl.textContent=q.en;charEl.style.fontSize='24px';romEl.textContent='';promptEl.textContent='How do you say this in Korean?';
  } else {
    charEl.textContent='🔊';charEl.style.fontSize='72px';romEl.textContent='';promptEl.textContent='Listen and choose the correct meaning';
    setTimeout(()=>spk(q.ch),300);
  }
  const wrong=pool.filter(x=>x.ch!==q.ch&&x.en!==q.en).sort(()=>Math.random()-.5).slice(0,3);
  const opts=[...wrong,q].sort(()=>Math.random()-.5);
  const el=document.getElementById('qOpts');el.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');b.className='qopt';
    if(quizMode==='reading'){
      b.innerHTML='<span style="font-family:\'Noto Serif KR\',serif;font-size:18px">'+o.ch+'</span><br><span style="font-size:10px;color:var(--ink3)">'+o.rom+'</span>';
    } else {b.textContent=o.en;}
    b.onclick=()=>checkQuiz(o.ch===q.ch,b,q);
    el.appendChild(b);
  });
}

function checkQuiz(correct,btn,q){
  if(quizAnswered)return;
  quizAnswered=true;S.qTotal++;
  document.querySelectorAll('.qopt').forEach(o=>o.onclick=null);
  const fb=document.getElementById('qFb');
  if(correct){
    btn.classList.add('ok');S.qCorrect++;
    fb.textContent='✓ Correct!';fb.style.color='#2e7d32';
  } else {
    btn.classList.add('no');
    fb.textContent='✗ The answer was: '+q.en;fb.style.color='var(--red)';
    document.querySelectorAll('.qopt').forEach(o=>{
      if(quizMode==='reading'){if(o.querySelector('span')&&o.querySelector('span').textContent===q.ch)o.classList.add('ok');}
      else{if(o.textContent===q.en)o.classList.add('ok');}
    });
  }
  saveS();
  document.getElementById('qCorrect').textContent=S.qCorrect;
  document.getElementById('qTotal').textContent=S.qTotal;
  setTimeout(nextQuiz,1400);
}

function spkQuiz(){if(quizCurrent)spk(quizCurrent.ch);}

// ═══════════════════════════════════════
// MENU
// ═══════════════════════════════════════
let activeCat='All';let menuRendered=false;
function renderMenu(filter){
  filter=(filter||'').toLowerCase();
  const catTabsEl=document.getElementById('catTabs');
  const grid=document.getElementById('menuGrid');
  if(!menuRendered){
    const allCats=['All',...MENU.map(c=>c.cat)];
    catTabsEl.innerHTML='';
    allCats.forEach(c=>{
      const b=document.createElement('button');b.className='ctab'+(c===activeCat?' on':'');b.textContent=c;
      b.onclick=()=>{activeCat=c;document.querySelectorAll('.ctab').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderMenu(document.getElementById('menuSearch').value);};
      catTabsEl.appendChild(b);
    });
    menuRendered=true;
  }
  grid.innerHTML='';let count=0;
  MENU.forEach(cat=>{
    if(activeCat!=='All'&&cat.cat!==activeCat)return;
    cat.items.forEach(item=>{
      const match=!filter||item.ch.includes(filter)||item.rom.toLowerCase().includes(filter)||item.en.toLowerCase().includes(filter)||(item.desc&&item.desc.toLowerCase().includes(filter));
      if(!match)return;
      count++;
      const d=document.createElement('div');d.className='mi';
      const safe=item.ch.replace(/'/g,"\\'");
      const tagMap={tv:'🌿 Veg',th:'🌶️ Spicy',tp:'⭐ Popular',ts:'🐟 Seafood'};
      const tag=item.tag?`<span class="mtag ${item.tag}">${tagMap[item.tag]||''}</span>`:'';
      d.innerHTML=`<div class="mchar">${item.ch}</div>
        <div class="minfo"><div class="mrom">${item.rom}</div><div class="men">${item.en}</div><div class="mdesc">${item.desc||''}${tag}</div></div>
        <button class="mspk" onclick="event.stopPropagation();spk('${safe}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></button>`;
      d.onclick=()=>spk(item.ch);grid.appendChild(d);
    });
  });
  document.getElementById('menuCount').textContent=count+' items';
}
function filterMenu(){renderMenu(document.getElementById('menuSearch').value);}

// ═══════════════════════════════════════
// PHRASES
// ═══════════════════════════════════════
let activePhrCat=Object.keys(PHRASES)[0];let phraseTabsRendered=false;
function renderPhrases(){
  const tabsEl=document.getElementById('phraseTabs');
  if(!phraseTabsRendered){
    Object.keys(PHRASES).forEach(cat=>{
      const b=document.createElement('button');b.className='ptab'+(cat===activePhrCat?' on':'');b.textContent=cat;
      b.onclick=()=>{activePhrCat=cat;document.querySelectorAll('.ptab').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderPhraseList();};
      tabsEl.appendChild(b);
    });
    phraseTabsRendered=true;
  }
  renderPhraseList();
}
function renderPhraseList(){
  const listEl=document.getElementById('phraseList');listEl.innerHTML='';
  (PHRASES[activePhrCat]||[]).forEach(p=>{
    const d=document.createElement('div');d.className='pcard';
    const safe=p.jp.replace(/'/g,"\\'");
    d.innerHTML=`<div class="pcn" onclick="spk('${safe}')">${p.jp}</div>
      <div class="pdet"><div class="prom">${p.rom}</div><div class="pen">${p.en}</div></div>
      <button class="pspk" onclick="spk('${safe}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></button>`;
    d.onclick=()=>spk(p.jp);listEl.appendChild(d);
    if(!S.seenPhrases.includes(p.jp)){S.seenPhrases.push(p.jp);saveS();}
  });
}

// ═══════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════
function renderProgress(){
  const totalMenu=MENU.reduce((a,c)=>a+c.items.length,0);
  const totalPhr=Object.values(PHRASES).reduce((a,c)=>a+c.length,0);
  const seenM=S.seenMenu.length,seenP=S.seenPhrases.length;
  const acc=S.qTotal>0?Math.round(S.qCorrect/S.qTotal*100)+'%':'—';
  document.getElementById('pDays').textContent=S.days;
  document.getElementById('pStreak').textContent=S.streak;
  document.getElementById('pAcc').textContent=acc;
  document.getElementById('pSeen').textContent=seenM;
  document.getElementById('pMenuFrac').textContent=seenM+'/'+totalMenu;
  document.getElementById('pMenuBar').style.width=(seenM/totalMenu*100)+'%';
  document.getElementById('pPhrFrac').textContent=seenP+'/'+totalPhr;
  document.getElementById('pPhrBar').style.width=(seenP/totalPhr*100)+'%';
  document.getElementById('sc').textContent=S.streak;
}
function confirmReset(){
  if(!confirm('Reset all progress?'))return;
  localStorage.removeItem(LS);location.reload();
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2200);}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
if('serviceWorker' in navigator)navigator.serviceWorker.getRegistrations().then(r=>r.forEach(reg=>reg.unregister()));
loadS();
document.getElementById('sc').textContent=S.streak;
renderMenu();
</script>
</body>
</html>
